<div class="auth-container">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your account</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="john@example.com"/>
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Valid email is required
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••"/>
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password is required
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="switch-link">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
